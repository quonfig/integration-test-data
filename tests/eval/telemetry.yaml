---
function: post
tests:
  # ──────────────────────────────────────────────────
  # Category 1: Evaluation Reason Reporting
  # ──────────────────────────────────────────────────
  - cases:
      - name: reason is STATIC for config with no targeting rules
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        data:
          keys:
            - "brand.new.string"
        expected_data:
          - key: "brand.new.string"
            type: CONFIG
            value: "hello.world"
            value_type: string
            count: 1
            reason: 1
            summary:
              config_row_index: 0
              conditional_value_index: 0

      - name: reason is STATIC for feature flag with only ALWAYS_TRUE rules
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        data:
          keys:
            - "always.true"
        expected_data:
          - key: "always.true"
            type: FEATURE_FLAG
            value: true
            value_type: bool
            count: 1
            reason: 1
            summary:
              config_row_index: 0
              conditional_value_index: 0

      - name: reason is TARGETING_MATCH when config has targeting rules but evaluation falls through
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        data:
          keys:
            - "my-test-key"
        expected_data:
          - key: "my-test-key"
            type: CONFIG
            value: "my-test-value"
            value_type: string
            count: 1
            reason: 2
            summary:
              config_row_index: 0
              conditional_value_index: 1

      - name: reason is TARGETING_MATCH when a targeting rule matches
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        contexts:
          block:
            user:
              key: "michael"
        data:
          keys:
            - "feature-flag.integer"
        expected_data:
          - key: "feature-flag.integer"
            type: FEATURE_FLAG
            value: 5
            value_type: int
            count: 1
            reason: 2
            summary:
              config_row_index: 0
              conditional_value_index: 0

      - name: reason is SPLIT for weighted value evaluation
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        contexts:
          block:
            user:
              tracking_id: "92a202f2"
        data:
          keys:
            - "feature-flag.weighted"
        expected_data:
          - key: "feature-flag.weighted"
            type: FEATURE_FLAG
            value: 2
            value_type: int
            count: 1
            reason: 3
            summary:
              config_row_index: 0
              conditional_value_index: 0
              weighted_value_index: 2

      - name: reason is TARGETING_MATCH for feature flag fallthrough with targeting rules
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        data:
          keys:
            - "feature-flag.integer"
        expected_data:
          - key: "feature-flag.integer"
            type: FEATURE_FLAG
            value: 3
            value_type: int
            count: 1
            reason: 2
            summary:
              config_row_index: 0
              conditional_value_index: 1

  # ──────────────────────────────────────────────────
  # Category 2: Counting & Grouping
  # ──────────────────────────────────────────────────
  - cases:
      - name: evaluation summary deduplicates identical evaluations
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        data:
          keys:
            - "brand.new.string"
            - "brand.new.string"
            - "brand.new.string"
            - "brand.new.string"
            - "brand.new.string"
        expected_data:
          - key: "brand.new.string"
            type: CONFIG
            value: "hello.world"
            value_type: string
            count: 5
            reason: 1
            summary:
              config_row_index: 0
              conditional_value_index: 0

      - name: evaluation summary creates separate counters for different rules of same config
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        contexts:
          block:
            user:
              key: "michael"
        data:
          keys:
            - "feature-flag.integer"
          keys_without_context:
            - "feature-flag.integer"
        expected_data:
          - key: "feature-flag.integer"
            type: FEATURE_FLAG
            value: 5
            value_type: int
            count: 1
            reason: 2
            summary:
              config_row_index: 0
              conditional_value_index: 0
          - key: "feature-flag.integer"
            type: FEATURE_FLAG
            value: 3
            value_type: int
            count: 1
            reason: 2
            summary:
              config_row_index: 0
              conditional_value_index: 1

      - name: evaluation summary groups by config key
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        data:
          keys:
            - "brand.new.string"
            - "always.true"
        expected_data:
          - key: "brand.new.string"
            type: CONFIG
            value: "hello.world"
            value_type: string
            count: 1
            reason: 1
            summary:
              config_row_index: 0
              conditional_value_index: 0
          - key: "always.true"
            type: FEATURE_FLAG
            value: true
            value_type: bool
            count: 1
            reason: 1
            summary:
              config_row_index: 0
              conditional_value_index: 0

  # ──────────────────────────────────────────────────
  # Category 3: selectedValue Type Wrapping
  # ──────────────────────────────────────────────────
  - cases:
      - name: selectedValue wraps string correctly
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        data:
          keys:
            - "brand.new.string"
        expected_data:
          - key: "brand.new.string"
            type: CONFIG
            value: "hello.world"
            value_type: string
            count: 1
            reason: 1
            selected_value:
              string: "hello.world"
            summary:
              config_row_index: 0
              conditional_value_index: 0

      - name: selectedValue wraps boolean correctly
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        data:
          keys:
            - "brand.new.boolean"
        expected_data:
          - key: "brand.new.boolean"
            type: CONFIG
            value: false
            value_type: bool
            count: 1
            reason: 1
            selected_value:
              bool: false
            summary:
              config_row_index: 0
              conditional_value_index: 0

      - name: selectedValue wraps int correctly
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        data:
          keys:
            - "brand.new.int"
        expected_data:
          - key: "brand.new.int"
            type: CONFIG
            value: 123
            value_type: int
            count: 1
            reason: 1
            selected_value:
              int: 123
            summary:
              config_row_index: 0
              conditional_value_index: 0

      - name: selectedValue wraps double correctly
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        data:
          keys:
            - "brand.new.double"
        expected_data:
          - key: "brand.new.double"
            type: CONFIG
            value: 123.99
            value_type: double
            count: 1
            reason: 1
            selected_value:
              double: 123.99
            summary:
              config_row_index: 0
              conditional_value_index: 0

      - name: selectedValue wraps string list correctly
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        data:
          keys:
            - "my-string-list-key"
        expected_data:
          - key: "my-string-list-key"
            type: CONFIG
            value:
              - "a"
              - "b"
              - "c"
            value_type: string_list
            count: 1
            reason: 1
            selected_value:
              stringList:
                - "a"
                - "b"
                - "c"
            summary:
              config_row_index: 0
              conditional_value_index: 0

  # ──────────────────────────────────────────────────
  # Category 4: Context Telemetry
  # ──────────────────────────────────────────────────
  - cases:
      - name: context shape merges fields across multiple records
        client: client
        function: post
        aggregator: context_shape
        endpoint: "/api/v1/context-shapes"
        data:
          - user:
              name: "alice"
              age: 30
          - user:
              name: "bob"
              score: 9.5
            team:
              name: "engineering"
        expected_data:
          - name: "user"
            field_types:
              name: 2
              age: 1
              score: 4
          - name: "team"
            field_types:
              name: 2

      - name: example contexts deduplicates by key value
        client: client
        function: post
        aggregator: example_contexts
        endpoint: "/api/v1/telemetry"
        data:
          - user:
              key: "user-123"
              name: "alice"
          - user:
              key: "user-123"
              name: "bob"
        expected_data:
          user:
            key: "user-123"
            name: "alice"

  # ──────────────────────────────────────────────────
  # Category 5: Configuration Modes
  # ──────────────────────────────────────────────────
  - cases:
      - name: telemetry disabled emits nothing
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        data:
          keys:
            - "brand.new.string"
        expected_data:
        client_overrides:
          collect_evaluation_summaries: false
          context_upload_mode: :none

      - name: shapes only mode reports shapes but not examples
        client: client
        function: post
        aggregator: context_shape
        endpoint: "/api/v1/context-shapes"
        data:
          user:
            name: "alice"
            key: "alice-123"
        expected_data:
          - name: "user"
            field_types:
              name: 2
              key: 2
        client_overrides:
          context_upload_mode: :shape_only

  # ──────────────────────────────────────────────────
  # Category 6: Edge Cases
  # ──────────────────────────────────────────────────
  - cases:
      - name: log level evaluations are excluded from telemetry
        client: client
        function: post
        aggregator: evaluation_summary
        endpoint: "/api/v1/telemetry"
        data:
          keys:
            - "log-level.prefab.criteria_evaluator"
        expected_data:

      - name: empty context produces no context telemetry
        client: client
        function: post
        aggregator: context_shape
        endpoint: "/api/v1/context-shapes"
        data: {}
        expected_data:
