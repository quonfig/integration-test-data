      ############################################################
      ## IS_PRESENT / IS_NOT_PRESENT                            ##
      ##                                                        ##
      ## Semantics: 'present' means the property path resolves  ##
      ## AND the value is not null/undefined. Empty string '',  ##
      ## 0, and false ARE present (this is intentional -- the   ##
      ## question 'is the field set at all' is type-agnostic).  ##
      ## Missing key or null value = NOT present.               ##
      ############################################################

      - name: returns true for IS_PRESENT rule when the given prop is a non-empty string
        client: feature_flag_client
        function: enabled
        contexts:
          block:
            user:
              id: "abc"
        input:
          flag: "feature-flag.is-present"
        expected:
          value: true

      - name: returns true for IS_PRESENT rule when the given prop is an empty string
        client: feature_flag_client
        function: enabled
        contexts:
          block:
            user:
              id: ""
        input:
          flag: "feature-flag.is-present"
        expected:
          value: true

      - name: returns true for IS_PRESENT rule when the given prop is the integer zero
        client: feature_flag_client
        function: enabled
        contexts:
          block:
            user:
              id: 0
        input:
          flag: "feature-flag.is-present"
        expected:
          value: true

      - name: returns true for IS_PRESENT rule when the given prop is boolean false
        client: feature_flag_client
        function: enabled
        contexts:
          block:
            user:
              id: false
        input:
          flag: "feature-flag.is-present"
        expected:
          value: true

      - name: returns false for IS_PRESENT rule when the given prop is null
        client: feature_flag_client
        function: enabled
        contexts:
          block:
            user:
              id: null
        input:
          flag: "feature-flag.is-present"
        expected:
          value: false

      - name: returns false for IS_PRESENT rule when the given prop key is missing from the context
        client: feature_flag_client
        function: enabled
        contexts:
          block:
            user:
              name: "bob"
        input:
          flag: "feature-flag.is-present"
        expected:
